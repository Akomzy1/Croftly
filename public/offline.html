<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Croftly — offline</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100dvh; display: flex; align-items: center; justify-content: center;
    background: #faf9f5; color: #51504e;
    font-family: Inter, ui-sans-serif, system-ui, sans-serif; padding: 6%;
  }
  .card { max-width: 30rem; text-align: center; }
  .mark { width: 56px; height: 56px; margin: 0 auto 1.25rem; display: block; }
  h1 { font-family: Sora, ui-sans-serif, system-ui, sans-serif; font-weight: 600; color: #070503; font-size: 1.75rem; letter-spacing: -0.01em; }
  p { margin-top: 0.75rem; font-size: 1rem; line-height: 1.5; }
  .tag { display: inline-block; margin-bottom: 1.25rem; padding: 0.35rem 0.8rem; border-radius: 999px;
    background: #fcedd9; color: #c18434; font-size: 0.8rem; font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <svg class="mark" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="Croftly">
      <path d="M48 17 A 22 22 0 1 0 48 47" fill="none" stroke="#4C9A2A" stroke-width="8.5" stroke-linecap="round"/>
      <path d="M31 45 C29 37 31 32 31 25" fill="none" stroke="#3C7B21" stroke-width="3.2" stroke-linecap="round"/>
      <path d="M31 34 C23 35 20 29 21 23 C29 22 31.5 27 31 34 Z" fill="#81B869"/>
      <path d="M31 31 C39 32 42 26 41 20 C33 19 30.5 24 31 31 Z" fill="#4C9A2A"/>
      <circle cx="31" cy="23" r="2.6" fill="#D6452F"/>
    </svg>
    <span class="tag">You're offline</span>
    <h1>No connection right now</h1>
    <p>Your saved box and preferences are still available once you reopen Croftly. Live matching, prices and checkout need a connection — we'll never show stale prices as if they're live. Reconnect and we'll pick up where you left off.</p>
  </div>
</body>
</html>
